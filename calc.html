<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
 <style>
  :root{ --bg:#0C0D10; --gold:#C9A75C; --gold-bright:#D4AF6A; --cream:#F2EFE8; --muted:#C3C5CB; --faint:#76787E; --line:#23262C; --ink:#0C0D10; --panel:#14161A; --panel2:#101216; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{scrollbar-width:none;-ms-overflow-style:none;}
  html::-webkit-scrollbar{width:0;height:0;display:none;}
  body{background:#0C0D10;overflow:hidden;}
  ::selection{background:rgba(201,167,92,.28);color:#fff;}
 </style>
</helmet>

<div style="background:var(--bg);color:var(--cream);font-family:'Manrope',ui-sans-serif,system-ui,sans-serif;display:flex;justify-content:center;align-items:flex-start;padding:clamp(28px,6vw,56px) 20px 56px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased;">
 <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(58% 34% at 50% -4%, rgba(201,167,92,.05), transparent 62%);z-index:1;"></div>
 <div style="width:100%;max-width:600px;position:relative;z-index:2;">

  <p style="font-size:14px;line-height:1.55;color:var(--muted);margin:0 0 20px;max-width:46ch;">Выберите ступень: состав и цена обновятся ниже.</p>

  <div style="display:flex;flex-direction:column;gap:10px;">
   <sc-for list="{{ cards }}" as="card" hint-placeholder-count="3">
    <label style="{{ card.cardStyle }}" style-hover="box-shadow:0 8px 22px -12px rgba(0,0,0,.75);">
      <input type="checkbox" checked="{{ card.isSelected }}" onChange="{{ card.toggle }}" style="position:absolute;opacity:0;width:1px;height:1px;margin:0;pointer-events:none;"/>
      <span style="{{ card.boxStyle }}"><span style="{{ card.checkStyle }}"></span></span>
      <span style="flex:1;min-width:0;">
        <span style="display:flex;justify-content:space-between;gap:12px;align-items:baseline;">
          <span style="display:flex;align-items:center;gap:9px;flex-wrap:wrap;">
            <span style="{{ card.titleStyle }}">{{ card.name }}</span>
            <sc-if value="{{ card.hasBadge }}" hint-placeholder-val="{{ false }}"><span style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);background:rgba(201,167,92,.14);padding:3px 8px;border-radius:5px;">{{ card.badge }}</span></sc-if>
          </span>
          <span style="{{ card.priceStyle }}">{{ card.priceLabel }}</span>
        </span>
        <span style="{{ card.descStyle }}">{{ card.desc }}</span>
      </span>
    </label>
   </sc-for>
  </div>

  <div style="margin-top:26px;background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:22px 22px 20px;box-shadow:0 30px 60px -34px rgba(0,0,0,.8);">
    <div style="margin-bottom:16px;">
      <div style="font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:11px;">Что входит</div>
      <div style="display:flex;flex-direction:column;gap:9px;">
       <sc-for list="{{ breakdown }}" as="row" hint-placeholder-count="5">
         <div style="display:flex;gap:10px;align-items:baseline;">
           <span style="flex:0 0 auto;width:5px;height:5px;border-radius:50%;background:var(--gold);position:relative;top:-3px;"></span>
           <span style="font-size:13.5px;color:#C3C5CB;line-height:1.4;">{{ row.name }}</span>
         </div>
       </sc-for>
      </div>
    </div>

    <div style="height:1px;background:var(--line);margin:4px 0 16px;"></div>

    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:18px;">
      <div>
        <div style="font-size:12.5px;color:var(--faint);margin-bottom:5px;">Выбрано</div>
        <div style="font-size:clamp(20px,5vw,26px);font-weight:700;letter-spacing:-.02em;line-height:1.1;color:var(--cream);">{{ tierName }}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:12.5px;color:var(--faint);margin-bottom:5px;">Цена</div>
        <div style="font-size:clamp(24px,6vw,32px);font-weight:700;letter-spacing:-.025em;line-height:1;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--cream);">{{ priceText }}</div>
      </div>
    </div>

    <a href="{{ ctaHref }}" target="_blank" rel="noopener noreferrer" style="{{ ctaStyle }}" style-hover="filter:brightness(1.06);">Обсудить в Telegram <span style="font-size:17px;line-height:0;">→</span></a>

    <p style="text-align:center;font-size:12.5px;color:var(--faint);line-height:1.5;margin:13px 0 0;">Каталог-старт полностью засчитывается при переходе на старшие ступени.</p>
    <p style="text-align:center;font-size:12.5px;color:var(--faint);line-height:1.5;margin:6px 0 0;">Точную смету назову после короткого брифа.</p>
  </div>

 </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
 &quot;$preview&quot;: {&quot;width&quot;: 640, &quot;height&quot;: 880},
 &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#C9A75C&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#C9A75C&quot;, &quot;#D9B25E&quot;, &quot;#B8893A&quot;, &quot;#C8B073&quot;]}
}">
class Component extends DCLogic {
  state = { tier: 'store' };

  TIERS = [
    { id: 'store', name: 'Магазин', price: 'от 35 000 грн', badge: 'всё включено',
      desc: 'Корзина, оплата картой, интеграция служб доставки и админ-панель. Всё, что показано на этой странице.',
      inc: ['Каталог целиком: поиск и фильтры', 'Корзина и оформление заказа', 'Оплата картой онлайн', 'Интеграция служб доставки', 'Админ-панель: товары, заказы, остатки', 'Уведомления о заказах в Telegram'] },
    { id: 'catalog', name: 'Каталог', price: 'от 18 000 грн', badge: '',
      desc: 'Все товары с фото, ценами и наличием. Заказ уходит в директ или форму.',
      inc: ['Все товары: фото, цены, наличие', 'Поиск и фильтры', 'Кнопка заказа: директ или форма', 'Мобильная версия', 'Подключение домена'] },
    { id: 'start', name: 'Каталог-старт', price: '8 000 грн', badge: 'лёгкий старт',
      desc: '20-30 товаров с фото, ценами и наличием. Ступенька, чтобы начать без риска.',
      inc: ['20-30 товаров: фото, цены, наличие', 'Кнопка заказа: директ или форма', 'Мобильная версия', 'Подключение домена', 'Полный зачёт при апгрейде'] },
  ];

  select(id) { this.setState({ tier: id }); }

  hexToRgb(h) { h = String(h).replace('#', ''); if (h.length === 3) h = h.split('').map(c => c + c).join(''); const n = parseInt(h, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
  mix(a, b, t) { const A = this.hexToRgb(a), B = this.hexToRgb(b); return 'rgb(' + Math.round(A[0] + (B[0] - A[0]) * t) + ',' + Math.round(A[1] + (B[1] - A[1]) * t) + ',' + Math.round(A[2] + (B[2] - A[2]) * t) + ')'; }

  renderVals() {
    const accent = this.props.accent || '#C9A75C';
    const bg = '#0C0D10', panel = '#14161A';
    const tint = this.mix(panel, accent, 0.14);
    const selBorder = this.mix(bg, accent, 0.5);
    const bright = this.mix(accent, '#ffffff', 0.3);

    const mkBox = sel => ({ flex: '0 0 auto', width: '22px', height: '22px', borderRadius: '50%', border: '1.5px solid ' + (sel ? accent : '#3A3E46'), background: sel ? accent : 'rgba(255,255,255,.02)', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .2s', marginTop: '1px' });
    const mkCheck = sel => ({ width: '5px', height: '9px', borderRight: '2px solid #0C0D10', borderBottom: '2px solid #0C0D10', transform: sel ? 'rotate(45deg)' : 'rotate(45deg) scale(.4)', opacity: sel ? 1 : 0, transition: 'all .2s', marginTop: '-2px' });

    const cards = this.TIERS.map(o => {
      const sel = this.state.tier === o.id;
      return {
        id: o.id, name: o.name, desc: o.desc, isSelected: sel,
        badge: o.badge, hasBadge: !!o.badge,
        priceLabel: o.price,
        toggle: () => this.select(o.id),
        cardStyle: { display: 'flex', gap: '14px', alignItems: 'flex-start', padding: '15px 17px', borderRadius: '14px', border: '1px solid ' + (sel ? selBorder : '#23262C'), background: sel ? tint : panel, cursor: 'pointer', transition: 'border-color .2s, background .2s, box-shadow .2s', position: 'relative', userSelect: 'none', textAlign: 'left' },
        boxStyle: mkBox(sel),
        checkStyle: mkCheck(sel),
        titleStyle: { fontSize: '15.5px', fontWeight: 600, color: '#F2EFE8', lineHeight: 1.3 },
        descStyle: { display: 'block', fontSize: '13px', color: '#C3C5CB', lineHeight: 1.5, marginTop: '5px' },
        priceStyle: { fontFamily: "'Space Mono',monospace", fontSize: '12.5px', fontWeight: 500, color: sel ? bright : '#76787E', whiteSpace: 'nowrap' },
      };
    });

    const cur = this.TIERS.find(o => o.id === this.state.tier) || this.TIERS[0];
    const breakdown = cur.inc.map(name => ({ name }));

    return {
      cards, breakdown,
      tierName: cur.name,
      priceText: cur.price,
      ctaStyle: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', width: '100%', boxSizing: 'border-box', padding: '15px 22px', borderRadius: '12px', background: accent, color: '#0C0D10', fontSize: '15.5px', fontWeight: 700, textDecoration: 'none', cursor: 'pointer', transition: 'filter .15s', boxShadow: '0 14px 30px -16px ' + this.mix(accent, '#000000', 0.05) },
      ctaHref: 'https://t.me/maegamidev',
    };
  }
}
</script>
<script>
window.I18N_EN = {
  "Выберите ступень: состав и цена обновятся ниже.": "Pick a tier: what's included and the price update below.",
  "Что входит": "What's included",
  "Выбрано": "Selected",
  "Цена": "Price",
  "Обсудить в Telegram": "Discuss on Telegram",
  "Каталог-старт полностью засчитывается при переходе на старшие ступени.": "Catalogue Start counts in full when you upgrade to a higher tier.",
  "Точную смету назову после короткого брифа.": "I'll give the exact quote after a short brief.",
  "Магазин": "Store",
  "всё включено": "all included",
  "Корзина, оплата картой, интеграция служб доставки и админ-панель. Всё, что показано на этой странице.": "Cart, card payments, shipping integration and an admin panel. Everything shown on this page.",
  "Каталог целиком: поиск и фильтры": "The full catalogue: search and filters",

  "Оплата картой онлайн": "Online card payments",

  "Админ-панель: товары, заказы, остатки": "Admin panel: products, orders, stock",
  "Уведомления о заказах в Telegram": "Order notifications in Telegram",

  "Все товары с фото, ценами и наличием. Заказ уходит в директ или форму.": "Every product with photos, prices and stock. Orders go to DMs or a form.",
  "Все товары: фото, цены, наличие": "All products: photos, prices, stock",
  "Поиск и фильтры": "Search and filters",
  "Кнопка заказа: директ или форма": "Order button: DM or form",
  "Мобильная версия": "Mobile version",
  "Подключение домена": "Domain setup",
  "Каталог-старт": "Catalogue Start",
  "лёгкий старт": "easy start",
  "20-30 товаров с фото, ценами и наличием. Ступенька, чтобы начать без риска.": "20-30 products with photos, prices and stock. A step to start without risk.",
  "20-30 товаров: фото, цены, наличие": "20-30 products: photos, prices, stock",
  "Полный зачёт при апгрейде": "Counts in full on upgrade"
};
window.I18N_PAT = [
  { re: /от (\d)/g, to: "from $1" },
  { re: /грн/g, to: "UAH" }
];
window.I18N_UK = {
  "Выберите ступень: состав и цена обновятся ниже.": "Оберіть ступінь: склад і ціна оновляться нижче.",
  "Что входит": "Що входить",
  "Выбрано": "Обрано",
  "Цена": "Ціна",
  "Обсудить в Telegram": "Обговорити в Telegram",
  "Каталог-старт полностью засчитывается при переходе на старшие ступени.": "Каталог-старт повністю зараховується при переході на старші ступені.",
  "Точную смету назову после короткого брифа.": "Точний кошторис назву після короткого брифу.",
  "всё включено": "все включено",
  "Корзина, оплата картой, интеграция служб доставки и админ-панель. Всё, что показано на этой странице.": "Кошик, оплата карткою, інтеграція служб доставки й адмін-панель. Усе, що показано на цій сторінці.",
  "Каталог целиком: поиск и фильтры": "Каталог цілком: пошук і фільтри",
  "Корзина и оформление заказа": "Кошик і оформлення замовлення",
  "Оплата картой онлайн": "Оплата карткою онлайн",
  "Интеграция служб доставки": "Інтеграція служб доставки",
  "Админ-панель: товары, заказы, остатки": "Адмін-панель: товари, замовлення, залишки",
  "Уведомления о заказах в Telegram": "Сповіщення про замовлення в Telegram",
  "Все товары с фото, ценами и наличием. Заказ уходит в директ или форму.": "Усі товари з фото, цінами й наявністю. Замовлення йде в директ або форму.",
  "Все товары: фото, цены, наличие": "Усі товари: фото, ціни, наявність",
  "Поиск и фильтры": "Пошук і фільтри",
  "Кнопка заказа: директ или форма": "Кнопка замовлення: директ або форма",
  "Мобильная версия": "Мобільна версія",
  "Подключение домена": "Підключення домену",
  "лёгкий старт": "легкий старт",
  "20-30 товаров с фото, ценами и наличием. Ступенька, чтобы начать без риска.": "20-30 товарів з фото, цінами й наявністю. Сходинка, щоб почати без ризику.",
  "20-30 товаров: фото, цены, наличие": "20-30 товарів: фото, ціни, наявність",
  "Полный зачёт при апгрейде": "Повний залік при апгрейді"
};
window.I18N_PAT_UK = [
  { re: /от (\d)/g, to: "від $1" }
];
</script>
<script src="./i18n-embed.js"></script>
</body>
</html>
