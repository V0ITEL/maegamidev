document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\">\n      <sc-for list=\"{{ frames }}\" as=\"frame\" hint-placeholder-count=\"4\">\n        <button type=\"button\" aria-pressed=\"{{ frame.ariaPressed }}\" aria-label=\"{{ frame.tabAria }}\" onclick=\"{{ frame.onTab }}\" style=\"{{ frame.tabStyle }}\" style-hover=\"background:rgba(201,162,74,0.07);\" style-focus=\"outline:2px solid #C9A24A; outline-offset:3px; border-radius:3px;\">{{ frame.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <p style=\"margin:clamp(10px,1.6vw,14px) 0 0; text-align:center; color:#7d715c; font:500 clamp(10px,2.2vw,12px) 'Golos Text',sans-serif; letter-spacing:.12em; text-transform:uppercase;\">Автовоспроизведение · выберите шаг, чтобы посмотреть<\u002Fp>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;pace&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:2700,&quot;min&quot;:1800,&quot;max&quot;:4200,&quot;step&quot;:100,&quot;unit&quot;:&quot;ms&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Демо&quot;},&quot;cursor&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Демо&quot;}}\">\nclass Component extends DCLogic {\n  state = { active: 0, cx: 50, cy: 60, pressing: false, clickId: 0, reduced: false, pressBox: null };\n\n  frames = [\n    { label: 'Каталог', box: { x: 25.3, y: 44,   w: 11.4, h: 30,  r: 12 } },\n    { label: 'Товар',   box: { x: 50.3, y: 38.3, w: 21.2, h: 7.0, r: 8  } },\n    { label: 'Корзина',   box: { x: 61.3, y: 31.4, w: 7.0,  h: 5.2, r: 6  } },\n  ];\n\n  timers = [];\n\n  center(i) { const b = this.frames[i].box; return { x: b.x + b.w / 2, y: b.y + b.h / 2 }; }\n\n  componentDidMount() {\n    let reduced = false;\n    try {\n      this.mq = window.matchMedia('(prefers-reduced-motion: reduce)');\n      reduced = this.mq.matches;\n      this.mqHandler = (e) => { this.setState({ reduced: e.matches }); this.runFrame(this.state.active); };\n      this.mq.addEventListener('change', this.mqHandler);\n    } catch (e) {}\n    this.setState({ reduced }, () => this.runFrame(0));\n  }\n\n  componentWillUnmount() {\n    this.clearTimers();\n    try { this.mq && this.mq.removeEventListener('change', this.mqHandler); } catch (e) {}\n  }\n\n  clearTimers() { this.timers.forEach((t) => clearTimeout(t)); this.timers = []; }\n  add(fn, ms) { this.timers.push(setTimeout(fn, ms)); }\n\n  motionOn() { return !this.state.reduced && (this.props.cursor !== false); }\n  pace() { const p = Number(this.props.pace); return (p >= 1600 && p <= 6000) ? p : 2700; }\n\n  runFrame(i) {\n    this.clearTimers();\n    this.setState({ active: i, pressing: false });\n    const dur = this.pace();\n    if (!this.motionOn()) {\n      this.add(() => this.runFrame((i + 1) % this.frames.length), Math.max(2600, dur + 1200));\n      return;\n    }\n    const c = this.center(i);\n    this.add(() => this.setState({ cx: c.x, cy: c.y }), 460);\n    this.add(() => this.doClick(), dur - 760);\n    this.add(() => this.runFrame((i + 1) % this.frames.length), dur - 340);\n  }\n\n  doClick() {\n    const box = this.frames[this.state.active].box;\n    this.setState((s) => ({ pressing: true, clickId: s.clickId + 1, pressBox: box }));\n    this.add(() => this.setState({ pressing: false }), 200);\n  }\n\n  selectTab(i) { this.runFrame(i); }\n\n  renderVals() {\n    const { active, cx, cy, pressing, clickId, reduced } = this.state;\n    const motion = this.motionOn();\n    const fadeMs = reduced ? 1200 : 760;\n    const frames = this.frames.map((f, i) => {\n      const isA = i === active;\n      return {\n        label: f.label,\n        ariaPressed: isA ? 'true' : 'false',\n        tabAria: 'Шаг ' + (i + 1) + ': ' + f.label,\n        tabStyle: {\n          appearance: 'none', background: 'transparent', border: '0',\n          borderBottom: '2px solid ' + (isA ? '#C9A24A' : 'transparent'),\n          color: isA ? '#E7CB7C' : '#B6A98F',\n          font: '600 clamp(10px,2.5vw,13px) \"Golos Text\", system-ui, sans-serif',\n          letterSpacing: '.16em', textTransform: 'uppercase',\n          padding: '10px clamp(8px,2.4vw,18px) 8px', cursor: 'pointer',\n          transition: 'color .3s ease, border-color .3s ease', whiteSpace: 'nowrap',\n        },\n        onTab: () => this.selectTab(i),\n      };\n    });\n    const imgStyle = (i) => ({\n      position: 'absolute', inset: 0, width: '100%', height: '100%',\n      objectFit: 'cover', objectPosition: 'top center',\n      opacity: i === active ? 1 : 0, transition: 'opacity ' + fadeMs + 'ms ease', willChange: 'opacity',\n    });\n    const pbox = this.state.pressBox || this.frames[active].box;\n    return {\n      frames,\n      imgStyle0: imgStyle(0), imgStyle1: imgStyle(1), imgStyle2: imgStyle(2),\n      cursorVisible: motion,\n      cursorOuterStyle: {\n        position: 'absolute', top: 0, left: 0, zIndex: 5, pointerEvents: 'none',\n        transform: 'translate(' + cx + 'cqw, ' + cy + 'cqh)',\n        transition: 'transform 900ms cubic-bezier(.22,.61,.36,1)', willChange: 'transform',\n      },\n      cursorInnerStyle: {\n        transform: 'scale(' + (pressing ? 0.8 : 1) + ')',\n        transition: 'transform 140ms ease', filter: 'drop-shadow(0 4px 7px rgba(0,0,0,.5))',\n      },\n      ringOn: motion && clickId > 0,\n      ringKey: clickId,\n      ringWrapStyle: {\n        position: 'absolute', top: 0, left: 0, zIndex: 6, pointerEvents: 'none',\n        transform: 'translate(' + cx + 'cqw, ' + cy + 'cqh)',\n      },\n      ringStyle: {\n        width: '48px', height: '48px', marginLeft: '-24px', marginTop: '-24px',\n        borderRadius: '999px', border: '2px solid rgba(231,203,124,.92)',\n        boxShadow: '0 0 16px rgba(231,203,124,.4)', animation: 'eu-ring 600ms ease-out forwards',\n      },\n      pressOn: motion && clickId > 0 && !!this.state.pressBox,\n      pressKey: clickId,\n      pressWrapStyle: {\n        position: 'absolute', top: 0, left: 0, zIndex: 4, pointerEvents: 'none',\n        transform: 'translate(' + pbox.x + 'cqw, ' + pbox.y + 'cqh)',\n        width: pbox.w + 'cqw', height: pbox.h + 'cqh',\n      },\n      pressBoxStyle: {\n        position: 'absolute', inset: 0, borderRadius: pbox.r + 'px',\n        border: '2px solid rgba(231,203,124,.9)',\n        background: 'rgba(231,203,124,.07)',\n        boxShadow: '0 0 26px rgba(231,203,124,.4)',\n        transformOrigin: 'center',\n        animation: 'eu-press 520ms ease-out forwards',\n      },\n      pressBoxStyle2: {\n        position: 'absolute', inset: 0, borderRadius: pbox.r + 'px',\n        border: '1.5px solid rgba(231,203,124,.5)',\n        boxShadow: '0 0 18px rgba(231,203,124,.25)',\n        transformOrigin: 'center',\n        animation: 'eu-press 600ms ease-out 130ms forwards',\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<script src='./demo-i18n.js'><\u002Fscript><script src='./i18n-embed.js'><\u002Fscript><\u002Fbody><\u002Fhtml>"
